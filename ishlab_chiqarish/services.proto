    string name = 1;
    string image = 2;
}

message CreateUserERes {
    string message = 1;
}

message UpdateUserEReq {
    string id = 1;
    string name = 2;
    string image = 3;
}

message UpdateUserERes {
    string message = 1;
}

message GetAllUserEReq {
