// ADMOTKA ISHCHILARINI YARATISH
message CreateUserAReq {
    string name = 1;
    string image = 2;
}

message CreateUserARes {
    string message = 1;
}

message UpdateUserAReq {
    string id = 1;
    string name = 2;
    string image = 3;
}

message UpdateUserARes {
    string message = 1;
}

message DeleteUserAReq {
    string id = 1;
}

message DeleteUserARes {
    string message = 1;
}   

message GetAllUserAReq {
    int64 limit = 1;
    int64 page = 2;
}

message UsersA {
    string id = 1;
    string name = 2;
    string image = 3;
}

message GetAllUserARes {
