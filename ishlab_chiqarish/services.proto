syntax = "proto3";

package services;

option go_package = "genproto/services";

import "google/protobuf/timestamp.proto";

service ServicesService {
    ```
    // GROUP
    rpc CreateGroup(CreateGroupReq) returns (CreateGroupRes);
    rpc UpdateGroup(UpdateGroupReq) returns (UpdateGroupRes);
    rpc DeleteGroup(DeleteGroupReq) returns (DeleteGroupRes);
    rpc GetAllGroup(GetAllGroupReq) returns (GetAllGroupRes);

    // WORKER
    rpc CreateWorker(CreateWorkerReq) returns (CreateWorkerRes);
    rpc UpdateWorker(UpdateWorkerReq) returns (UpdateWorkerRes);
    rpc DeleteWorker(DeleteWorkerReq) returns (DeleteWorkerRes);
    rpc GetAllWorker(GetAllWorkerReq) returns (GetAllWorkerRes);

    // ATTENDANCE
    rpc CreateAttendance(CreateAttendanceReq) returns (CreateAttendanceRes);
    rpc UpdateAttendance(UpdateAttendanceReq) returns (UpdateAttendanceRes);
    rpc DeleteAttendance(DeleteAttendanceReq) returns (DeleteAttendanceRes);
    rpc GetDailyAttendance(GetDailyAttendanceReq) returns (GetDailyAttendanceRes);
    rpc GetAllAttendance(GetAllAttendanceReq) returns (GetAllAttendanceRes);

    // TASK
    rpc CreateTask(CreateTaskReq) returns (CreateTaskRes);
    rpc UpdateTask(UpdateTaskReq) returns (UpdateTaskRes);
    rpc DeleteTask(DeleteTaskReq) returns (DeleteTaskRes);
    rpc GetAllTask(GetAllTaskReq) returns (GetAllTaskRes);
    rpc GetTaskById(GetTaskByIdReq) returns (GetTaskByIdRes);
    ```
}

//////////////////// GROUP ////////////////////
message Group {
    string id = 1;
    string name = 2;
    string master = 3;
}

message CreateGroupReq {
    string name = 1;
    string master = 2;
}

message CreateGroupRes {
    string message = 1;
}

message UpdateGroupReq {
    string id = 1;
    string name = 2;
    string master = 3;
}

message UpdateGroupRes {
    string message = 1;
}

message DeleteGroupReq {
    string id = 1;
}

message DeleteGroupRes {
    string message = 1;
}

message GetAllGroupReq {
    int64 limit = 1;
    int64 page = 2;
    }

message GetAllGroupRes {
    repeated Group groups = 1;
}

//////////////////// WORKER ////////////////////
message Worker {
    string id = 1;
    string name = 2;
    string image = 3;
    string group_id = 4;
}

message CreateWorkerReq {
    string name = 1;
    string image = 2;
    string group_id = 3;
}

message CreateWorkerRes {
    string message = 1;
}

message UpdateWorkerReq {
    string id = 1;
    string name = 2;
    string image = 3;
    string group_id = 4;
}

message UpdateWorkerRes {
    string message = 1;
}

message DeleteWorkerReq {
    string id = 1;
}

message DeleteWorkerRes {
    string message = 1;
}

message GetAllWorkerReq {
    int64 limit = 1;
    int64 page = 2;
    string group_id = 3;
}

message GetAllWorkerRes {
    repeated Worker workers = 1;
}

//////////////////// ATTENDANCE ////////////////////
message Attendance {
    string worker_id = 1;
    string situation = 2;
    string reason = 3;
    bool is_present = 4;
    google.protobuf.Timestamp work_date = 5;
}

message CreateAttendanceReq {
    repeated Attendance attendance = 1;
}

message CreateAttendanceRes {
    string message = 1;
}

message UpdateAttendanceReq {
    repeated Attendance attendance = 1;
}

message UpdateAttendanceRes {
    string message = 1;
}

message DeleteAttendanceReq {
    google.protobuf.Timestamp work_date = 1;
    string group_id = 2;
}

message DeleteAttendanceRes {
    string message = 1;
}

message GetDailyAttendanceReq {
    google.protobuf.Timestamp work_date = 1;
    string group_id = 2;
}

message GetDailyAttendanceRes {
    repeated Attendance attendance = 1;
}

message GetAllAttendanceReq {
    google.protobuf.Timestamp start_date = 1;
    google.protobuf.Timestamp end_date = 2;
    string group_id = 3;
}

message GetAllAttendanceRes {
    repeated Attendance attendance = 1;
}

//////////////////// TASK ////////////////////
message Task {
    string id = 1;
    string worker_id = 2;
    string task = 3;
    google.protobuf.Timestamp deadline = 4;
    google.protobuf.Timestamp start_time = 5;
    google.protobuf.Timestamp end_time = 6;
}

message CreateTaskReq {
    string worker_id = 1;
    string task = 2;
    google.protobuf.Timestamp deadline = 3;
    google.protobuf.Timestamp start_time = 4;
    google.protobuf.Timestamp end_time = 5;
}

message CreateTaskRes {
    string message = 1;
}

message UpdateTaskReq {
    string id = 1;
    string worker_id = 2;
    google.protobuf.Timestamp deadline = 3;
    google.protobuf.Timestamp end_time = 4;
}

message UpdateTaskRes {
    string message = 1;
}

message DeleteTaskReq {
    string id = 1;
}

message DeleteTaskRes {
    string message = 1;
}

message GetAllTaskReq {
    string worker_id = 1;
    int64 limit = 2;
    int64 page = 3;
}

message GetAllTaskRes {
    repeated Task tasks = 1;
}

message GetTaskByIdReq {
    string id = 1;
}

message GetTaskByIdRes {
    Task task = 1;
}
