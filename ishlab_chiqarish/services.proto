syntax = "proto3";

option go_package = "genproto/services";

package services;

service ServicesService {
    rpc CreateGroup(CreateGroupReq) returns (CreateGroupRes);
    rpc UpdateGroup(UpdateGroupReq) returns (UpdateGroupRes);
    rpc DeleteGroup(DeleteGroupReq) returns (DeleteGroupRes);
    rpc GetAllGroup(GetAllGroupReq) returns (GetAllGroupRes);

    rpc CreateUser(CreateWorkerReq) returns (CreateWorkerRes);
    rpc UpdateUser(UpdateWorkerReq) returns (UpdateWorkerRes);
    rpc DeleteUser(DeleteWorkerReq) returns (DeleteWorkerRes);
    rpc GetAllUser(GetAllWorkerReq) returns (GetAllWorkerRes);

    rpc CreateRecyclingAttendance(CreateRecyclingAttendanceReq) returns (CreateRecyclingAttendanceRes);
    rpc UpdateRecyclingAttendance(UpdateRecyclingAttendanceReq) returns (UpdateRecyclingAttendanceRes);
    rpc DeleteRecyclingAttendance(DeleteRecyclingAttendanceReq) returns (DeleteRecyclingAttendanceRes);
    rpc GetRecyclingDailyAttendance(GetRecyclingDailyAttendanceReq) returns (GetRecyclingDailyAttendanceRes);
    rpc GetRecyclingAllAttendance(GetRecyclingAllAttendanceReq) returns (GetRecyclingAllAttendanceRes);

    rpc CreateRecyclingTask(CreateRecyclingTaskReq) returns (CreateRecyclingTaskRes);
    rpc UpdateRecyclingTask(UpdateRecyclingTaskReq) returns (UpdateRecyclingTaskRes);
    rpc DeleteRecyclingTask(DeleteRecyclingTaskReq) returns (DeleteRecyclingTaskRes);
    rpc GetRecyclingAllTask(GetRecyclingAllTaskReq) returns (GetRecyclingAllTaskRes);
    rpc GetRecyclingIdTask(GetRecyclingIdTaskReq) returns (GetRecyclingIdTaskRes);
}

//Create group
message CreateGroupReq {
    string name = 1;
    string master = 2;
}

message CreateGroupRes{
    string message = 1;
}

message UpdateGroupReq{
    string id = 1;
    string name = 2;
    string master = 3;
}

message UpdateGroupRes{
    string message = 1;
}

message DeleteGroupReq{
    string id = 1;
}

message DeleteGroupRes{
    string message = 1;
}

message GetAllGroupReq{
    int64 limit = 1;
    int64 page = 2;
}

message GetAllGroupRes{
    string message = 1;
}

//Ishchilarga vazifa berishni control qilish
message GetRecyclingIdTaskRes {
    string id = 1;
    string name = 2;
    string task = 3;
    string deadling = 4;
    string percent = 5;
    string start_time = 6;
    string end_time = 7;
}

message GetRecyclingIdTaskReq {
    string id = 1;
    string usera_id = 2;
}

message AllTask {
    string id = 1;
    string name = 2;
    string task = 3;
    string deadling = 4;
    string percent = 5;
    string start_time = 6;
    string end_time = 7;
}

message GetRecyclingAllTaskRes {
    repeated AllTask tasks = 1;
}

message GetRecyclingAllTaskReq {
    string usera_id = 1;
    int64 limit = 2;
    int64 page = 3;
}

message DeleteRecyclingTaskReq {
    string id = 1;
    string usera_id = 2;
}

message DeleteRecyclingTaskRes {
    string message = 1;
}

message UpdateRecyclingTaskReq {
    string id = 1;
    string usera_id = 2;
    string percent = 3;
    string end_time = 4;
    string deadling = 5;
}

message UpdateRecyclingTaskRes {
    string message = 1;
}

message CreateRecyclingTaskReq {
    string usera_id = 1;
    string task = 2;
    string deadling = 3;
    string start_time = 4;
    string end_time = 5;
}

message CreateRecyclingTaskRes {
    string message = 1;
}

//Qayta ishlash  ishchilarini davomat qilish
message GetRecyclingAllAttendanceReq {
    string start_day = 1;
    string end_time = 2;
    string group_id = 3;
}

message GetRecyclingAllAttendanceRes{
    repeated AllAttendance a = 1;
}

message AllAttendance {
    string name = 1;
    string situation = 2;
    string reason = 3;
    string is_present = 4;
    string today_date = 5;
}

message GetRecyclingDailyAttendanceReq {
    string that_day = 1;
    string group_id = 2;
}

message GetRecyclingDailyAttendanceRes {
    string message = 1;
}

message DeleteRecyclingAttendanceReq {
    string that_day = 1;
    string group_id = 2;
}

message DeleteRecyclingAttendanceRes {
    string message = 1;
}

message AttendanceItemUpdate {
    string usera_id = 1;
    string situation = 2;
    string reason = 3;
    string is_present = 4;
    string today_date = 5;
}

message UpdateRecyclingAttendanceReq {
    repeated AttendanceItemUpdate u = 1;
}

message UpdateRecyclingAttendanceRes {
    string message = 1;
}

message AttendanceItem {
    string usera_id = 1;
    string situation = 2;
    string reason = 3;
    string is_present = 4;
    string today_date = 5;
}

message CreateRecyclingAttendanceReq {
    repeated AttendanceItem attendance = 1;
}

message CreateRecyclingAttendanceRes {
    string message = 1;
}

//ISHCHILARINI YARATISH
message CreateWorkerReq {
    string name = 1;
    string image = 2;
    string group_id = 3;
}

message CreateWorkerRes {
    string message = 1;
}

message UpdateWorkerReq {
    string id = 1;
    string name = 2;
    string image = 3;
    string group_id = 4;
}

message UpdateWorkerRes {
    string message = 1;
}

message DeleteWorkerReq {
    string id = 1;
}

message DeleteWorkerRes {
    string message = 1;
}   

message GetAllWorkerReq {
    int64 limit = 1;
    int64 page = 2;
}

message Worker {
    string id = 1;
    string name = 2;
    string image = 3;
    string group_id = 4;
}

message GetAllWorkerRes {
    repeated Worker users = 1;
}