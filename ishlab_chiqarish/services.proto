    string image = 2;
}

message CreateUserPRes {
    string message = 1;
}

message UpdateUserPReq {
    string id = 1;
    string name = 2;
    string image = 3; 
}

message UpdateUserPRes {
    string message = 1;
}

message DeleteUserPReq {
    string id = 1;
}

message DeleteUserPRes {
    string message = 1;
}

message GetAllUserPReq {
    int64 limit = 1;
    int64 page = 2;
}

message UsersP {
    string id = 1;
    string name = 2;
    string image = 3;
}

